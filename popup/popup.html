<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>英翻中翻譯器設定</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h2>英翻中翻譯器</h2>
    <p class="desc">由 Claude AI 驅動</p>

    <div class="field">
      <label for="apiKey">Claude API Key</label>
      <input
        type="password"
        id="apiKey"
        placeholder="sk-ant-..."
        autocomplete="off"
      />
    </div>

    <button id="saveBtn">儲存</button>
    <div id="status"></div>

    <hr />

    <button id="immersiveBtn" class="immersive-btn">沈浸式翻譯此頁面</button>

    <div id="usageInfo" class="usage-info"></div>

    <div class="hint">
      <strong>如何取得 API Key？</strong><br/>
      前往 console.anthropic.com → API Keys → 建立新 Key
    </div>

    <div class="usage">
      <strong>選字翻譯</strong>：選取英文文字 → 點「譯」按鈕<br/>
      <strong>沈浸式翻譯</strong>：點上方按鈕，自動在每段英文下方加入中文翻譯
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
