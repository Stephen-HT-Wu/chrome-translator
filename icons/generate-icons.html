<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>圖示產生器</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f5f5f5; }
    h2 { margin-bottom: 20px; }
    .previews { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 24px; }
    .preview { text-align: center; }
    .preview span { display: block; font-size: 12px; color: #666; margin-top: 6px; }
    button {
      padding: 10px 24px;
      background: #5b5bd6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #4747c2; }
  </style>
</head>
<body>
  <h2>英翻中翻譯器 — 圖示產生器</h2>
  <div class="previews" id="previews"></div>
  <button onclick="downloadAll()">下載所有尺寸</button>

  <script>
    const SIZES = [16, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const radius = size * 0.2;

      // 背景（圓角矩形）
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = '#5b5bd6';
      ctx.fill();

      // 文字「譯」
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${size * 0.58}px sans-serif`;
      ctx.fillText('譯', size / 2, size / 2 + size * 0.03);

      return canvas;
    }

    // 預覽
    const previews = document.getElementById('previews');
    SIZES.forEach(size => {
      const canvas = drawIcon(size);
      const wrapper = document.createElement('div');
      wrapper.className = 'preview';
      const label = document.createElement('span');
      label.textContent = `${size}x${size}`;
      wrapper.appendChild(canvas);
      wrapper.appendChild(label);
      previews.appendChild(wrapper);
    });

    function downloadAll() {
      SIZES.forEach(size => {
        const canvas = drawIcon(size);
        const a = document.createElement('a');
        a.download = `icon${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    }
  </script>
</body>
</html>
